<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

<head>
  <meta charset="UTF-8">

  {% seo %}

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#FFCC00">

  <link rel="preconnect" href="https://fonts.gstatic.com">

  <link rel="preload"
        href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap"
        as="style"
        type="text/css"
        crossorigin>

  <link rel="stylesheet"
        href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

  {% include head-custom.html %}

  <style>

    body{
      margin:0;
      font-family:'Open Sans', sans-serif;
      background:#ECECEF;
    }

    /* =========================
       NAVBAR
    ========================= */

    .navbar{
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%);

      width:80%;
      max-width:1250px;

      background:#FFCC00;

      border-radius:999px;

      display:flex;
      justify-content:space-around;
      align-items:center;

      padding:10px 20px;

      box-shadow:0 4px 20px rgba(0,0,0,0.12);

      z-index:9999;
    }

    .navbar a{
      text-decoration:none;

      color:#000 !important;

      font-size:25px;
      font-weight:700;

      padding:5px 30px;

      border-radius:999px;

      transition:all 0.3s ease;
    }

    .navbar a:hover{
      background:white;
      color:#000 !important;

      transform:translateY(-2px);
    }

    .navbar a.active{
      background:white;
      color:#000 !important;
    }

    /* =========================
       MAIN CONTENT
    ========================= */

    .main-content{
      width:80%;
      max-width:1250px;
      margin:70px auto 0 auto;
    }

    /* =========================
       FOOTER
    ========================= */

    .site-footer{
      text-align:center;

      padding:40px 0;

      font-size:14px;

      font-weight:400;

      color:#666;
    }

    /* =========================
       DARK MODE
    ========================= */

    body.dark{
      background:#111;
      color:white;
    }

    body.dark .navbar{
      background:#FFCC00;
    }

    body.dark .navbar a{
      color:#000 !important;
    }

    body.dark .navbar a:hover{
      background:white;
      color:#000 !important;
    }

    body.dark .navbar a.active{
      background:white;
      color:#000 !important;
    }

    body.dark .main-content{
      color:white;
    }

    body.dark .site-footer{
      color:#aaa;
    }

    /* =========================
       MOBILE
    ========================= */

    @media (max-width:1100px){

      .navbar{

        width:95%;

        padding:8px 10px;

        gap:4px;

        flex-wrap:nowrap;

        overflow-x:auto;
      }

      .navbar a{

        font-size:13px;

        padding:5px 10px;

        white-space:nowrap;
      }

      .main-content{

        width:95%;

        margin:90px auto 0 auto;
      }

      .site-footer{

        font-size:14px;

        padding:30px 0;
      }

    }

  </style>

</head>

<body>

  <!-- =========================
       NAVBAR
  ========================== -->

  <nav class="navbar">

    <a href="./index.html"
       class="{% if page.url == '/' %}active{% endif %}">
       Home
    </a>

    <a href="./aboutme.html"
       class="{% if page.url contains 'aboutme' %}active{% endif %}">
       About Me
    </a>

    <a href="./experience.html"
       class="{% if page.url contains 'experience' %}active{% endif %}">
       Experience
    </a>

    <a href="./projects.html"
       class="{% if page.url contains 'projects' %}active{% endif %}">
       Projects
    </a>

    <a href="./blog.html"
       class="{% if page.url contains 'blog' %}active{% endif %}">
       Blog
    </a>

    <a href="./contact.html"
       class="{% if page.url contains 'contact' %}active{% endif %}">
       Contact
    </a>

    <a class="dark-btn" onclick="toggleDarkMode()">
      Dark
    </a>

  </nav>

  <!-- =========================
       MAIN CONTENT
  ========================== -->

  <main id="content" class="main-content" role="main">

    {{ content }}

    <footer class="site-footer">

      <span class="site-footer-credits">
        © 2026 Tsz Yee Wun
      </span>

    </footer>

  </main>

  <!-- =========================
       DARK MODE SCRIPT
  ========================== -->

  <script>

    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

  </script>

</body>
</html>
